name: Build GameOptimizer XCFramework

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  quick-build-check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build for iOS Simulator (fast sanity check)
        run: |
          xcodebuild build \
            -scheme GameOptimizer \
            -destination "generic/platform=iOS Simulator" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  build-xcframework:
    needs: quick-build-check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for iOS device (arm64)
        run: |
          xcodebuild build \
            -scheme GameOptimizer \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -skipPackagePluginValidation \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme GameOptimizer \
            -destination "generic/platform=iOS Simulator" \
            -configuration Release \
            -skipPackagePluginValidation \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Locate built frameworks (debug aid)
        run: |
          find ~/Library/Developer/Xcode/DerivedData -maxdepth 6 -name "GameOptimizer.framework" 2>/dev/null || true

      - name: Create XCFramework
        run: |
          mkdir -p build
          DEVICE_FW=$(find ~/Library/Developer/Xcode/DerivedData -path "*Release-iphoneos*" -name "GameOptimizer.framework" | head -n1)
          SIM_FW=$(find ~/Library/Developer/Xcode/DerivedData -path "*Release-iphonesimulator*" -name "GameOptimizer.framework" | head -n1)
          echo "Device framework:    $DEVICE_FW"
          echo "Simulator framework: $SIM_FW"
          if [ -z "$DEVICE_FW" ] || [ -z "$SIM_FW" ]; then
            echo "::error::Could not locate GameOptimizer.framework in one of the build outputs — see 'Locate built frameworks' step above."
            exit 1
          fi
          xcodebuild -create-xcframework \
            -framework "$DEVICE_FW" \
            -framework "$SIM_FW" \
            -output build/GameOptimizer.xcframework

      - uses: actions/upload-artifact@v4
        with:
          name: GameOptimizer-xcframework
          path: build/GameOptimizer.xcframework
          if-no-files-found: error
