name: Build GameOptimizer XCFramework

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  quick-build-check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build for iOS Simulator (fast sanity check)
        run: |
          xcodebuild build \
            -scheme GameOptimizer \
            -destination "generic/platform=iOS Simulator" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  build-xcframework:
    needs: quick-build-check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Archive for iOS device (arm64)
        run: |
          xcodebuild archive \
            -scheme GameOptimizer \
            -destination "generic/platform=iOS" \
            -archivePath build/GameOptimizer-iOS.xcarchive \
            -skipPackagePluginValidation \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Archive for iOS Simulator
        run: |
          xcodebuild archive \
            -scheme GameOptimizer \
            -destination "generic/platform=iOS Simulator" \
            -archivePath build/GameOptimizer-iOSSimulator.xcarchive \
            -skipPackagePluginValidation \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Create XCFramework
        run: |
          xcodebuild -create-xcframework \
            -framework build/GameOptimizer-iOS.xcarchive/Products/Library/Frameworks/GameOptimizer.framework \
            -framework build/GameOptimizer-iOSSimulator.xcarchive/Products/Library/Frameworks/GameOptimizer.framework \
            -output build/GameOptimizer.xcframework

      - name: Zip XCFramework
        run: cd build && zip -r GameOptimizer.xcframework.zip GameOptimizer.xcframework

      - uses: actions/upload-artifact@v4
        with:
          name: GameOptimizer-xcframework
          path: build/GameOptimizer.xcframework.zip
          if-no-files-found: error
